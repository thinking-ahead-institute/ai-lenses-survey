<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thinking Ahead Institute | AI Lenses Survey</title>
  <style>
    :root {
      --green-1: #347573;
      --green-2: #BAD3D0;
      --green-3: #E2E8E7;
      --olive-1: #8B7504;
      --olive-2: #D8D2AD;
      --blue-1: #2A3768;
      --blue-2: #D0E3F7;
      --blue-3: #EDF4F9;
      --gold-1: #CC8436;
      --gold-2: #F4EEDA;
      --red-1: #832A2A;
      --red-2: #E0CDCD;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --border: #d7dde6;
      --accent: var(--blue-1);
      --accent-soft: var(--blue-2);
      --success: var(--green-1);
      --danger: var(--red-1);
      --shadow: 0 10px 28px rgba(42, 55, 104, 0.08);
      --radius: 0px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #edf4f9;
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 10px 12px 18px;
    }

    .masthead {
      background: var(--blue-1);
      color: #fff;
      border-radius: 0;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
      transition: padding 0.25s ease, margin 0.25s ease;
    }

    .masthead.compact {
      padding: 10px 14px;
      margin-bottom: 8px;
    }

    .masthead-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .logo-box {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 8px 0 8px 8px;
      justify-self: start;
      width: 100%;
      max-width: 150px;
    }

    .logo-box img {
      display: block;
      width: 100%;
      height: auto;
    }

    .eyebrow {
      display: inline-block;
      padding: 2px 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #d0e3f7;
    }

    .masthead h1 {
      font-size: 22px;
      line-height: 1.08;
      margin: 0;
      color: #fff;
      transition: font-size 0.25s ease;
    }

    .masthead.compact h1 {
      font-size: 20px;
      margin-bottom: 0;
    }

    .masthead-copy {
      display: none;
    }

    .masthead.compact .masthead-copy {
      display: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin: 4px 0 8px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress-shell {
      width: 220px;
      max-width: 100%;
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }

    .progress-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      text-align: right;
      font-weight: 700;
    }

    .progress {
      height: 6px;
      width: 100%;
      background: rgba(42, 55, 104, 0.10);
      border-radius: 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: var(--green-1);
      transition: width 0.25s ease;
    }

    .card {
      background: rgba(255,255,255,0.98);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(42, 55, 104, 0.08);
      padding: 22px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.12;
      margin: 0 0 10px;
      color: var(--blue-1);
    }

    h2 {
      font-size: 24px;
      line-height: 1.18;
      margin: 0 0 8px;
      color: var(--blue-1);
    }

    h3 {
      font-size: 16px;
      margin: 0 0 10px;
    }

    p { margin: 0 0 10px; }

    .muted { color: var(--muted); }

    .lens-description {
      margin: 8px 0 18px;
      padding: 14px 16px;
      background: var(--blue-3);
      border-left: 4px solid var(--blue-1);
      color: var(--blue-1);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--blue-2);
      color: var(--blue-1);
      margin-bottom: 14px;
    }

    .badge.macro {
      background: var(--gold-2);
      color: #7a4d18;
    }

    .badge.org {
      background: var(--green-2);
      color: var(--green-1);
    }

    .badge.collateral {
      background: var(--red-2);
      color: var(--red-1);
    }

    .intro-copy {
      max-width: 760px;
    }

    .intro-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, 360px);
      gap: 22px;
      align-items: start;
    }

    .intro-visual img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid rgba(42, 55, 104, 0.08);
      background: #fff;
    }

    .field-help {
      font-size: 12px;
      color: var(--muted);
      margin: 4px 0 0;
    }


    .intro-copy p {
      margin: 0 0 10px;
    }

    .scale-inline {
      font-size: 11px;
      color: var(--muted);
      margin: 10px 0 0;
    }

    .small-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .question-scale-note {
      display: none;
    }

    .question-block {
      margin-top: 12px;
      padding: 18px;
      border: 1px solid rgba(42, 55, 104, 0.08);
      background: #fff;
    }

    .question-block:first-of-type {
      margin-top: 0;
    }

    .question-row {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(280px, 340px);
      gap: 18px;
      align-items: center;
    }

    .question-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--blue-1);
    }

    .question-copy {
      max-width: 760px;
      font-size: 14px;
      margin: 0;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 0;
    }

    .option label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      background: #fff;
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option label:hover {
      border-color: rgba(52, 117, 115, 0.6);
      background: #f7fbfb;
      box-shadow: 0 8px 20px rgba(52, 117, 115, 0.08);
    }

    .option input:checked + .option-meta {
      color: var(--green-1);
    }

    .option label:has(input:checked) {
      border-color: var(--green-1);
      background: #eef7f6;
      box-shadow: 0 10px 20px rgba(52, 117, 115, 0.12);
    }

    .option-num {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .option-text {
      display: none;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 0;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--blue-1);
      color: #fff;
      box-shadow: 0 10px 24px rgba(42, 55, 104, 0.18);
    }

    .btn-secondary {
      background: var(--blue-3);
      color: var(--blue-1);
      border: 1px solid rgba(42, 55, 104, 0.08);
    }

    .btn-primary[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 700;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .small-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    textarea, select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 10px 12px;
      font-size: 15px;
      font-family: Arial, Helvetica, sans-serif;
      margin-top: 8px;
      background: #fff;
    }

    textarea:focus, select:focus, input[type="text"]:focus {
      outline: 2px solid rgba(52, 117, 115, 0.18);
      border-color: var(--green-1);
    }

    .field {
      margin-top: 14px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--blue-1);
    }

    .thank-you {
      text-align: center;
      padding: 32px 10px;
    }

    .thank-you .badge {
      background: var(--green-2);
      color: var(--green-1);
    }


    .collapsed-note {
      display: none;
    }

    .intro-bullets {
      margin: 8px 0 12px 18px;
      padding: 0;
    }

    .intro-bullets li {
      margin: 4px 0;
    }

    .intro-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .meta-box {
      background: #fff;
      border: 1px solid var(--border);
      padding: 10px;
    }

    .meta-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .hidden-on-questions {
      display: none;
    }

    .masthead.compact .logo-box {
      max-width: 150px;
    }

    .masthead.compact .eyebrow {
      margin-bottom: 6px;
    }

    @media (max-width: 820px) {
      .masthead-grid,
      .question-row,
      .intro-layout {
        grid-template-columns: 1fr;
      }

      .logo-box {
        justify-self: start;
        max-width: 180px;
      }
    }

    @media (max-width: 720px) {
      .wrap { padding-top: 10px; }
      .masthead { padding: 10px; border-radius: 0; }
      .masthead h1,
      h1 { font-size: 22px; }
      h2 { font-size: 20px; }
      .card { padding: 16px; }
      .question-block { padding: 14px; }
      .question-row { gap: 12px; }
      .options { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .option label { min-height: 48px; padding: 10px 6px; }
      .option-num { font-size: 16px; }
    }
  </style>
</head>

  <script>
    const APP_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    const SCALE = [
      { value: 1, label: "Not at all" },
      { value: 2, label: "Slightly" },
      { value: 3, label: "Moderately" },
      { value: 4, label: "Significantly" },
      { value: 5, label: "Extremely" }
    ];

    const lenses = [
      {
        id: 1,
        group: "Macro factor",
        name: "Diffusion",
        description: "How widely and unevenly AI is spreading across investment organisations, and what that means for who captures the benefit.",
        questions: {
          personal_focus: "How much have you reflected on how AI is diffusing across the investment ecosystem?",
          materiality: "How material is AI diffusion for your organisation or portfolio outcomes?",
          peer_attention: "How much attention do you see others giving to AI diffusion?"
        }
      },
      {
        id: 2,
        group: "Macro factor",
        name: "Disruption",
        description: "How AI is redrawing competitive boundaries, business models, and organisational relevance in asset management.",
        questions: {
          personal_focus: "How much have you reflected on AI as a disruptive force in investing or in your own organisation?",
          materiality: "How significant is AI-driven disruption for your organisation’s competitiveness or relevance?",
          peer_attention: "How seriously do peers appear to be treating AI disruption risks and opportunities?"
        }
      },
      {
        id: 3,
        group: "Macro factor",
        name: "HI × AI and Investing Process",
        description: "An operating model for investment decision-making in which human intelligence leads, frames and governs, while AI executes, scales and augments, together forming institutional intelligence (the Intelligence Stack) by converting data into decision-ready insight for investment.",
        questions: {
          personal_focus: "How much have you thought about the interaction between human intelligence and AI?",
          materiality: "How important do you see the HI × AI model for investment quality and outcomes?",
          peer_attention: "Have you heard of other organisations (or yours) thinking about HI × AI?"
        }
      },
      {
        id: 4,
        group: "Macro factor",
        name: "AI Investment Macro",
        description: "How AI is reshaping capital concentration, factor exposures, market structure, and portfolio construction.",
        questions: {
          personal_focus: "How much have you considered AI’s implications for capital concentration and portfolio construction?",
          materiality: "How material are AI-driven shifts in market structure for long-term returns?",
          peer_attention: "How much focus do others place on the AI investment macro lens?"
        }
      },
      {
        id: 5,
        group: "Org design factor",
        name: "Cultural features",
        description: "How people's foundational beliefs about what AI is, whether a tool, a threat, a power amplifier, or an emerging intelligence, shape their risk perceptions and determine whether adoption succeeds or stalls.",
        questions: {
          personal_focus: "How much attention have you given to cultural factors shaping AI adoption, or AI adoption shaping cultural factors?",
          materiality: "How significant is culture in determining whether AI delivers real impact?",
          peer_attention: "How seriously do others appear to be addressing AI-related culture issues?"
        }
      },
      {
        id: 6,
        group: "Org design factor",
        name: "AO technology system spend",

    function escapeHtml(text) {

        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");

    function updateProgress() {
      const displayStep = Math.min(currentStep + 1, totalSteps);
      const pct = (currentStep / (totalSteps - 1)) * 100;
      progressBar.style.width = `${pct}%`;
      progressLabel.textContent = `Step ${displayStep} of ${totalSteps}`;

    function badgeClass(group) {
      const normalized = String(group).toLowerCase();
      if (normalized.includes("macro")) return "badge macro";
      if (normalized.includes("org")) return "badge org";
      if (normalized.includes("collateral")) return "badge collateral";

function renderLens(stepIndex) {
      const lens = lenses[stepIndex - 1];
      const saved = responses.lenses[lens.id] || {};
      const qMap = [
        ["personal_focus", "A. Personal focus"],
        ["materiality", "B. Materiality"],
        ["peer_attention", "C. Peer attention"]
      ];

      app.innerHTML = `
        <div class="${badgeClass(lens.group)}">${escapeHtml(lens.group)}</div>
        <h2>Lens ${lens.id}: ${escapeHtml(lens.name)}</h2>
        <p class="lens-description">${escapeHtml(lens.description)}</p>
        <p class="scale-inline">Scale: 1 = Not at all, 2 = Slightly, 3 = Moderately, 4 = Significantly, 5 = Extremely</p>

        ${qMap.map(([key, label]) => `
          <section class="question-block">
            <div class="question-row">
              <div>
                <div class="question-title">${label}</div>
                <p class="question-copy">${escapeHtml(lens.questions[key])}</p>
              </div>
              <div class="options" role="radiogroup" aria-label="${escapeHtml(lens.questions[key])}">
                ${SCALE.map(item => `
                  <div class="option">
                    <label>
                      <input type="radio" name="${key}" value="${item.value}" ${String(saved[key] || "") === String(item.value) ? "checked" : ""} />
                      <div class="option-meta">
                        <span class="option-num">${item.value}</span>
                        <span class="option-text">${item.label}</span>
                      </div>
                    </label>
                  </div>
                `).join("")}
              </div>
            </div>
          </section>
        `).join("")}

        <div id="status" class="status"></div>
        ${navButtons({ nextLabel: stepIndex === lenses.length ? "Submit survey" : "Next" })}
      `;

      document.getElementById("backBtn").addEventListener("click", () => {
        currentStep -= 1;
        render();
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        const answers = {};
        for (const [key] of qMap) {
          const selected = document.querySelector(`input[name="${key}"]:checked`);
          if (!selected) {
            showStatus("Please answer all three questions before moving on.", true);
            return;
          }
          answers[key] = Number(selected.value);
        }
        responses.lenses[lens.id] = answers;

        if (stepIndex === lenses.length) {
          submitSurvey();
          return;
        }

        currentStep += 1;
        render();
      });
    }

    function renderProfile() {
      const p = responses.profile;
      app.innerHTML = `
        <div class="badge org">Respondent profile</div>
        <h2>Respondent profile</h2>

        <div class="field">
          <label for="organisation_type">Organisation type</label>
          <select id="organisation_type">
            <option value="">Select one</option>
            <option ${p.organisation_type === "Asset owner" ? "selected" : ""}>Asset owner</option>
            <option ${p.organisation_type === "Asset manager" ? "selected" : ""}>Asset manager</option>
            <option ${p.organisation_type === "Consultant / adviser" ? "selected" : ""}>Consultant / adviser</option>
            <option ${p.organisation_type === "Technology provider" ? "selected" : ""}>Technology provider</option>
            <option ${p.organisation_type === "Other" ? "selected" : ""}>Other</option>
          </select>
        </div>

        <div class="field">
          <label for="role_seniority">Role seniority</label>
          <select id="role_seniority">
            <option value="">Select one</option>
            <option ${p.role_seniority === "Executive / C-suite" ? "selected" : ""}>Executive / C-suite</option>
            <option ${p.role_seniority === "Senior leadership" ? "selected" : ""}>Senior leadership</option>
            <option ${p.role_seniority === "Mid-level" ? "selected" : ""}>Mid-level</option>
            <option ${p.role_seniority === "Specialist / analyst" ? "selected" : ""}>Specialist / analyst</option>
            <option ${p.role_seniority === "Other" ? "selected" : ""}>Other</option>
          </select>
        </div>

        <div class="field">
          <label for="ai_familiarity">How familiar are you personally with AI in an investment context?</label>
          <p class="field-help">From not at all familiar to regularly engaged.</p>
          <select id="ai_familiarity">
            <option value="">Select one</option>
            <option ${p.ai_familiarity === "Not at all familiar" ? "selected" : ""}>Not at all familiar</option>
            <option ${p.ai_familiarity === "Slightly familiar" ? "selected" : ""}>Slightly familiar</option>
            <option ${p.ai_familiarity === "Moderately familiar" ? "selected" : ""}>Moderately familiar</option>
            <option ${p.ai_familiarity === "Very familiar" ? "selected" : ""}>Very familiar</option>
            <option ${p.ai_familiarity === "Regularly engaged" ? "selected" : ""}>Regularly engaged</option>
          </select>
        </div>

        <div id="status" class="status"></div>
        ${navButtons({ showBack: false, nextLabel: "Continue" })}
      `;

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) {
        nextBtn.addEventListener("click", () => {
          const profile = {
            organisation_type: document.getElementById("organisation_type").value,
            role_seniority: document.getElementById("role_seniority").value,
            ai_familiarity: document.getElementById("ai_familiarity").value
          };

          if (!profile.organisation_type || !profile.role_seniority || !profile.ai_familiarity) {
            showStatus("Please complete the profile questions before continuing.", true);
            return;
          }

          responses.profile = profile;
          currentStep = 2;
          render();
        });
      }
    }

    function renderThankYou() {
      app.innerHTML = `
        <div class="thank-you">
          <div class="badge">Complete</div>
          <h1>Thank you</h1>
          <p>Your responses have been submitted successfully.</p>
          <p class="muted">Thank you for contributing to this work. You can explore more on our <a href="https://www.thinkingaheadinstitute.org/research-papers/technology-and-ai-hub/" target="_blank" rel="noopener noreferrer">Technology and AI Hub</a>.</p>
          <p class="muted">You may now close this page.</p>
        </div>
      `;
    }

    function showStatus(message, isError = false) {
      const status = document.getElementById("status");
      if (!status) return;
      status.textContent = message;
      status.className = `status ${isError ? "error" : "success"}`;
    }

    async function submitSurvey() {
      if (isSubmitting) return;

      if (!responses.profile.organisation_type || !responses.profile.role_seniority || !responses.profile.ai_familiarity) {
        showStatus("Please complete the profile questions before submitting.", true);
        return;
      }

      responses.meta.completed_at = new Date().toISOString();
      responses.meta.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";

      if (!APP_SCRIPT_URL || APP_SCRIPT_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE")) {
        showStatus("Add your Google Apps Script web app URL in the HTML file before publishing.", true);
        return;
      }

      isSubmitting = true;
      const btn = document.getElementById("nextBtn");
      btn.disabled = true;
      btn.textContent = "Submitting...";
      showStatus("Submitting your responses...", false);

      try {
        const response = await fetch(APP_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(responses)
        });

        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.message || "Submission failed.");
        }

        currentStep = 14;
        render();
      } catch (error) {
        console.error(error);
        showStatus("Submission failed. Please try again. If the issue persists, check the Apps Script deployment settings.", true);
        btn.disabled = false;
        btn.textContent = "Submit survey";
        isSubmitting = false;
      }
    }

    function render() {
      updateProgress();
      const masthead = document.querySelector(".masthead");
      if (masthead) masthead.classList.toggle("compact", currentStep > 0);

      if (currentStep === 0) {
        renderIntro();
      } else if (currentStep === 1) {
        renderProfile();
      } else if (currentStep >= 2 && currentStep <= 13) {
        renderLens(currentStep - 1);
      } else {
        renderThankYou();
      }
    }

    render();
  </script>
</body>
</html>
